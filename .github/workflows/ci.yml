name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: default
            args: "--workspace --all-targets --exclude nifi-integration-tests -- -D warnings"
          - name: all-features
            args: "--workspace --all-targets --all-features --exclude nifi-integration-tests -- -D warnings"
          - name: integration
            args: "-p nifi-integration-tests --all-targets -- -D warnings"
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy ${{ matrix.args }}

  test:
    name: Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: default
            args: "--workspace --exclude nifi-integration-tests"
          - name: all-features
            args: "--workspace --all-features --exclude nifi-integration-tests"
          - name: integration
            args: "-p nifi-integration-tests"
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - run: cargo test ${{ matrix.args }}

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --all-features --exclude nifi-integration-tests --no-deps

  msrv:
    name: MSRV check (Rust ${{ matrix.rust }})
    runs-on: ubuntu-latest
    env:
      # Override rust-toolchain.toml (which pins 1.93 for development) so we
      # actually compile against the declared MSRV.
      RUSTUP_TOOLCHAIN: ${{ matrix.rust }}
    strategy:
      matrix:
        rust: ["1.85"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - name: cargo check (default features)
        run: cargo check --workspace --exclude nifi-integration-tests
      - name: cargo check (all features)
        run: cargo check --workspace --all-features --exclude nifi-integration-tests

  deny:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo install cargo-deny --locked
      - run: cargo deny check

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-deny --locked
      - uses: pre-commit/action@v3.0.1
