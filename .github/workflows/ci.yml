name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - uses: pre-commit/action@v3.0.1

      - name: Clippy (nifi-2-7-2)
        run: cargo clippy -p nifi-rust-client --no-default-features --features nifi-2-7-2 -- -D warnings

      - name: Test (nifi-2-7-2)
        run: cargo test -p nifi-rust-client --no-default-features --features nifi-2-7-2

      - name: Clippy (dynamic)
        run: cargo clippy -p nifi-rust-client --features dynamic -- -D warnings

      - name: Test (dynamic)
        run: cargo test -p nifi-rust-client --features dynamic
