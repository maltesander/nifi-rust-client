name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches Cargo.toml version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version=$(cargo metadata --format-version 1 --no-deps | \
            jq -r '.packages[] | select(.name == "nifi-rust-client") | .version')
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "::error::Tag version ($tag_version) does not match Cargo.toml version ($cargo_version)"
            exit 1
          fi

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features --exclude nifi-integration-tests -- -D warnings
      - run: cargo test --workspace --all-features --exclude nifi-integration-tests
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --all-features --exclude nifi-integration-tests --no-deps

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - run: cargo deny check

      - name: Verify packaging
        run: |
          cargo package -p nifi-openapi-gen --allow-dirty
          cargo package -p nifi-rust-client --allow-dirty --no-verify

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2

      - name: Publish nifi-openapi-gen
        run: cargo publish -p nifi-openapi-gen || echo "::warning::nifi-openapi-gen publish skipped (version may already exist)"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: |
          version=$(cargo metadata --format-version 1 --no-deps | \
            jq -r '.packages[] | select(.name == "nifi-openapi-gen") | .version')
          echo "Waiting for nifi-openapi-gen $version to appear in index..."
          for i in $(seq 1 30); do
            if cargo search nifi-openapi-gen --limit 1 2>/dev/null | grep -q "$version"; then
              echo "Found in index after ${i}0 seconds"
              break
            fi
            sleep 10
          done

      - name: Publish nifi-rust-client
        run: cargo publish -p nifi-rust-client
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog entry
        id: changelog
        run: |
          awk '/^## \[${{ steps.version.outputs.version }}\]/{flag=1; next} /^## \[/{flag=0} flag' CHANGELOG.md \
            > release_notes.md
          echo "notes_file=release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.changelog.outputs.notes_file }}
          tag_name: ${{ github.ref_name }}
