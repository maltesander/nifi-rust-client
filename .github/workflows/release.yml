name: Release

on:
  push:
    tags:
      - 'gen-v[0-9]+.[0-9]+.[0-9]+'
      - 'client-v[0-9]+.[0-9]+.[0-9]+'
      - 'ctl-v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---------------------------------------------------------------------------
  # gen-v* — release nifi-openapi-gen
  # ---------------------------------------------------------------------------
  gen-test:
    name: Test (nifi-openapi-gen)
    if: startsWith(github.ref_name, 'gen-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches Cargo.toml version
        run: |
          tag_version="${GITHUB_REF_NAME#gen-v}"
          cargo_version=$(cargo metadata --format-version 1 --no-deps | \
            jq -r '.packages[] | select(.name == "nifi-openapi-gen") | .version')
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "::error::Tag version ($tag_version) does not match nifi-openapi-gen Cargo.toml version ($cargo_version)"
            exit 1
          fi

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check

      - name: Verify packaging
        run: cargo package -p nifi-openapi-gen

  gen-publish:
    name: Publish nifi-openapi-gen
    if: startsWith(github.ref_name, 'gen-v')
    runs-on: ubuntu-latest
    needs: gen-test
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2

      - name: Publish
        run: cargo publish -p nifi-openapi-gen
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  gen-release:
    name: GitHub Release (nifi-openapi-gen)
    if: startsWith(github.ref_name, 'gen-v')
    runs-on: ubuntu-latest
    needs: gen-publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#gen-v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog entry
        id: changelog
        run: |
          awk '/^## \[${{ steps.version.outputs.version }}\]/{flag=1; next} /^## \[/{flag=0} flag' \
            crates/nifi-openapi-gen/CHANGELOG.md > release_notes.md
          echo "notes_file=release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: nifi-openapi-gen ${{ steps.version.outputs.version }}
          body_path: ${{ steps.changelog.outputs.notes_file }}
          tag_name: ${{ github.ref_name }}

  # ---------------------------------------------------------------------------
  # client-v* — release nifi-rust-client
  # ---------------------------------------------------------------------------
  # This workflow assumes the nifi-openapi-gen version pinned in
  # crates/nifi-rust-client/Cargo.toml's build-dependencies is already
  # published on crates.io. `release.py client` validates this pre-flight.
  client-test:
    name: Test (nifi-rust-client)
    if: startsWith(github.ref_name, 'client-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches Cargo.toml version
        run: |
          tag_version="${GITHUB_REF_NAME#client-v}"
          cargo_version=$(cargo metadata --format-version 1 --no-deps | \
            jq -r '.packages[] | select(.name == "nifi-rust-client") | .version')
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "::error::Tag version ($tag_version) does not match nifi-rust-client Cargo.toml version ($cargo_version)"
            exit 1
          fi

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check

      - name: Verify packaging (nifi-rust-client)
        run: cargo package -p nifi-rust-client

  client-publish:
    name: Publish nifi-rust-client
    if: startsWith(github.ref_name, 'client-v')
    runs-on: ubuntu-latest
    needs: client-test
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2

      - name: Publish
        run: cargo publish -p nifi-rust-client
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  client-release:
    name: GitHub Release (nifi-rust-client)
    if: startsWith(github.ref_name, 'client-v')
    runs-on: ubuntu-latest
    needs: client-publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#client-v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog entry
        id: changelog
        run: |
          awk '/^## \[${{ steps.version.outputs.version }}\]/{flag=1; next} /^## \[/{flag=0} flag' \
            crates/nifi-rust-client/CHANGELOG.md > release_notes.md
          echo "notes_file=release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: nifi-rust-client ${{ steps.version.outputs.version }}
          body_path: ${{ steps.changelog.outputs.notes_file }}
          tag_name: ${{ github.ref_name }}

  # ---------------------------------------------------------------------------
  # ctl-v* — release nifictl
  # ---------------------------------------------------------------------------
  ctl-test:
    name: Test (nifictl)
    if: startsWith(github.ref_name, 'ctl-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches Cargo.toml version
        run: |
          tag_version="${GITHUB_REF_NAME#ctl-v}"
          cargo_version=$(cargo metadata --format-version 1 --no-deps | \
            jq -r '.packages[] | select(.name == "nifictl") | .version')
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "::error::Tag version ($tag_version) does not match nifictl Cargo.toml version ($cargo_version)"
            exit 1
          fi

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check

      - name: Verify packaging
        run: cargo package -p nifictl

  ctl-publish:
    name: Publish nifictl
    if: startsWith(github.ref_name, 'ctl-v')
    runs-on: ubuntu-latest
    needs: ctl-test
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2

      - name: Publish
        run: cargo publish -p nifictl
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  ctl-release:
    name: GitHub Release (nifictl)
    if: startsWith(github.ref_name, 'ctl-v')
    runs-on: ubuntu-latest
    needs: ctl-publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#ctl-v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog entry
        id: changelog
        run: |
          awk '/^## \[${{ steps.version.outputs.version }}\]/{flag=1; next} /^## \[/{flag=0} flag' \
            crates/nifictl/CHANGELOG.md > release_notes.md
          echo "notes_file=release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: nifictl ${{ steps.version.outputs.version }}
          body_path: ${{ steps.changelog.outputs.notes_file }}
          tag_name: ${{ github.ref_name }}
