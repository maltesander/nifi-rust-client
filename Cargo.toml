[workspace]
members = ["crates/*", "tests"]
resolver = "3"

[workspace.package]
version = "0.1.1"
authors = ["Malte Sander <contact@maltesander.com>"]
license = "Apache-2.0"
edition = "2024"
repository = "https://github.com/maltesander/nifi-rust-client"
homepage = "https://github.com/maltesander/nifi-rust-client"
documentation = "https://docs.rs/nifi-rust-client"

[workspace.dependencies]
nifi-openapi-gen = { path = "crates/nifi-openapi-gen" }
nifi-rust-client = { path = "crates/nifi-rust-client", default-features = false }
clap = { version = "4", features = ["derive", "env"] }
prettyplease = "0.2"
reqwest = { version = "0.13", default-features = false, features = ["json", "form", "query", "rustls"] }
semver = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
snafu = "0.9"
syn = { version = "2", features = ["full"] }
toml_edit = "0.25"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
url = "2"
wiremock = "0.6"

[workspace.lints.clippy]
unwrap_in_result = "deny"
unwrap_used = "deny"
panic = "deny"
